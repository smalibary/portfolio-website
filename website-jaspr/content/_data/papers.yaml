    order: 2
    visible: true
    abstract: |
      Cross-sectional survey of remote workers in Greater Sydney measuring a
      proposed Restorative Potential Index (RPI) for home workspaces against
      well-being and productivity outcomes. Targeting N = 200–400.

  - id: "03"
