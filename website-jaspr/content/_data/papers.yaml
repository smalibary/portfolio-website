papers:
  - id: "01"
    status: published          # published | active | design
    pill_label: published      # human-readable label shown on the card
    title_ar: التعرض للطبيعة والعافية النفسية، تحليل تلوي ثلاثي المستويات
    title_en: "Nature exposure and psychological well-being: A three-level meta-analysis"
    metric: g = -0.67
    metric_label: "95% CI [-1.16, -0.18] · 16 studies · 45 effect sizes"
    caption: Indoor Environments · 2026
    url: ""
    order: 1
    visible: true
    abstract: |
      Meta-analysis of 16 studies (45 effect sizes) examining the impact of
      nature exposure on psychological well-being among remote workers.
      Pooled effect Hedges g = -0.67, 95% CI [-1.16, -0.18], indicating a
      moderate-to-large reduction in negative affect symptoms following
      nature exposure interventions.

