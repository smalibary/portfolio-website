bio_ar: "باحث دكتوراه ف جامعة سيدني، أدرس أثر التعرض للطبيعة على العافية النفسية\nو إنتاجية العاملين عن بعد. اشتغل ف مختبر البيئة الداخلية ضمن كلية العمارة\nو التصميم. أيضاً محاضر ف قسم العمارة بجامعة الملك عبد العزيز.\n"

bio_en: "PhD candidate at the University of Sydney, researching the impact of\nnature exposure on the psychological well-being and productivity of\nremote workers. Affiliated with the Indoor Environments Lab, School of\nArchitecture, Design and Planning. Also a lecturer in the Architecture\nDepartment at King Abdulaziz University.\n"

