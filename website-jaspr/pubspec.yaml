name: website_jaspr
description: A documentation site built with Jaspr
version: 0.0.1

environment:
  sdk: ^3.10.0

dependencies:
  jaspr: ^0.23.0
  jaspr_content: ^0.5.2
  jaspr_router: ^0.8.2
  # Loads content/_data/site.yaml at build time so the homepage reflects
  # what the admin saves. See lib/data/site_data.dart.
  yaml: ^3.1.0
  # Renders blog post markdown bodies to HTML at build time.
  markdown: ^7.2.0

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.4.19
  jaspr_builder: ^0.23.0
  jaspr_cli: ^0.23.0
  lints: ^5.0.0
  # Used by tool/save_server.dart — the local-only admin save endpoint.
  shelf: ^1.4.0
  shelf_router: ^1.1.4
  yaml_edit: ^2.2.0

jaspr:
  mode: static
